# Voice plugin manifest (Track 1, plugin extraction Phase 1).
#
# Phase 1 (this commit): manifest declares what's already in core.
# Modules listed below currently live under runtime/lib/esr/entity/
# and py/src/voice_*. Operators see this plugin in `/plugin list` and
# can `/plugin info voice` to inspect its surface.
#
# Phase 2 (deferred): physical code move into this directory + remove
# voice-specific modules from core's compile path. Will land as its own
# PR with full e2e coverage and the bail-out-criteria smoke gate.
#
# Spec: docs/superpowers/specs/2026-05-04-plugin-mechanism-design.md §四.

name: voice
version: 0.1.0
description: |
  Voice gateway plugin: TTS / ASR / e2e voice peers + Volcengine doubao
  bidirectional WebSocket sidecars. Provides voice_tts / voice_asr /
  voice_e2e entities + their proxy variants.

depends_on:
  core: ">= 0.1.0"
  plugins: []

declares:
  # Injection #5 — Entity modules. Currently in core as
  # runtime/lib/esr/entity/voice_*.ex; manifest documents them.
  entities:
    - module: Esr.Entity.VoiceTTS
      kind: stateful
    - module: Esr.Entity.VoiceASR
      kind: stateful
    - module: Esr.Entity.VoiceE2E
      kind: stateful
    - module: Esr.Entity.VoiceTTSProxy
      kind: proxy
    - module: Esr.Entity.VoiceASRProxy
      kind: proxy

  # Injection #12 — python sidecars. (No registrations today; voice
  # peers spawn their python helpers via a different bootstrap path —
  # Esr.Scope.Admin.bootstrap_voice_pools/1. Phase 2 unifies via
  # Sidecar.Registry.)
  python_sidecars: []
