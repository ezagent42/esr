# Claude Code plugin manifest.
#
# PtyProcess stays in core (generic mechanism). The cc plugin spawns
# a PtyProcess for its claude binary by calling
# `Esr.Entity.PtyProcess.start_link(cmd: ...)` — no plugin-specific
# extension required.
#
# Spec: docs/superpowers/specs/2026-05-04-plugin-mechanism-design.md §四.

name: claude_code
version: 0.1.0
description: |
  Claude Code (CC) integration. CCProcess drives session lifecycle;
  CCProxy streams reply directives. Spawns a claude binary inside a
  core-provided PtyProcess; the cc agent_def in agents.yaml wires the
  pipeline (PtyProcess + CCProcess + CCProxy). The MCP server claude
  uses to push notifications and accept tool calls is hosted by
  `EsrWeb.McpController` (PR-3.5, 2026-05-05) — no separate Python
  sidecar; .mcp.json points claude at the esrd HTTP endpoint
  directly.

depends_on:
  core: ">= 0.1.0"
  plugins: []

declares:
  # Injection #5 — Entity modules.
  entities:
    - module: Esr.Entity.CCProcess
      kind: stateful
    - module: Esr.Entity.CCProxy
      kind: proxy

  # No python_sidecars — PR-3.5 (2026-05-05) deleted adapters/cc_mcp/.
  # The MCP server is now esrd-hosted (Elixir, EsrWeb.McpController).
