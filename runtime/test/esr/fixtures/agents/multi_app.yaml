# N=2 test fixture — two agents, each referencing a different Feishu app_id
# via ${app_id} template. Spec §3.5.
#
# Capability names use the canonical prefix:name/perm form required by
# Esr.Capabilities.Grants.matches?/2 (see docs/notes/capability-name-format-mismatch.md).

agents:
  cc:
    description: "Claude Code for multi-app tests"
    capabilities_required:
      - session:default/create
      - peer_proxy:feishu/forward
    pipeline:
      inbound:
        - name: feishu_chat_proxy
          impl: Esr.Peers.FeishuChatProxy
      outbound:
        - feishu_chat_proxy
    proxies:
      - name: feishu_app_proxy
        impl: Esr.Peers.FeishuAppProxy
        target: "admin::feishu_app_adapter_${app_id}"
    params:
      - name: dir
        required: true
        type: path
      - name: app_id
        required: true
        type: string

  cc-echo:
    description: "Simple echo variant without CC pipeline — used by N=2 routing tests"
    capabilities_required:
      - session:default/create
      - peer_proxy:feishu/forward
    pipeline:
      inbound:
        - name: feishu_chat_proxy
          impl: Esr.Peers.FeishuChatProxy
      outbound:
        - feishu_chat_proxy
    proxies:
      - name: feishu_app_proxy
        impl: Esr.Peers.FeishuAppProxy
        target: "admin::feishu_app_adapter_${app_id}"
    params:
      - name: dir
        required: true
        type: path
      - name: app_id
        required: true
        type: string
