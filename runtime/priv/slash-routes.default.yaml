# slash-routes.yaml — declarative slash command routing.
#
# Schema:
#   schema_version: 1
#   slashes:
#     "/<group>:<verb>":
#       kind: <internal name>
#       permission: <cap string or null>
#       command_module: <Elixir module name>
#       requires_workspace_binding: bool
#       requires_user_binding: bool
#       category: <group label for /help rendering>
#       description: <user-facing text>
#       args:                                          # list of {name, required, default}
#         - { name: <kw>, required: bool }
#   internal_kinds:
#     <kind>:
#       permission: <cap string>
#       command_module: <module>
#
# Phase 6 (2026-05-07): hard colon-namespace cutover. ALL slashes renamed to
# /<group>:<verb> form. Aliases field REMOVED from all entries (complete
# switch, no aliases). Old forms return a deprecated-slash hint from
# Esr.Entity.SlashHandler's @deprecated_slashes map.
#
# Exceptions (bare meta commands, no resource group):
#   /help   — keep bare (meta-system)
#   /doctor — keep bare (meta-system)
#
# `slashes:` entries are slash-callable (FAA / Telegram / etc. routes "/"-prefixed
# inbound text here). `internal_kinds:` entries are kind-only — used by the
# Esr.Admin.CommandQueue.Watcher CLI path and other internal callers; never
# appear in /help output.

schema_version: 1

slashes:
  "/help":
    kind: help
    permission: null
    command_module: "Esr.Commands.Help"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "诊断"
    description: "显示这份命令清单 / show command reference"
    args: []

  "/doctor":
    kind: doctor
    permission: null
    command_module: "Esr.Commands.Doctor"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "诊断"
    description: "状态检查 + 卡在哪步的 bootstrap 步骤建议"
    args: []

  "/user:whoami":
    kind: user_whoami
    permission: null
    command_module: "Esr.Commands.Whoami"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "诊断"
    description: "显示你的身份 + chat / workspace 绑定状态"
    args: []

  "/pty:key":
    kind: pty_key
    permission: null
    command_module: "Esr.Commands.Pty.Key"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "PTY"
    description: "把特殊键盘输入（up/down/enter/esc/tab/c-X 等）发到 chat-current session 的 PTY"
    args:
      - { name: keys, required: true }

  "/workspace:new":
    kind: workspace_new
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.New"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "创建新 workspace，hybrid 存储：folder=<path> 走 repo-bound (<path>/.esr/workspace.json)；不传 folder= 走 ESR-bound ($ESRD_HOME/<inst>/workspaces/<name>/)"
    args:
      - { name: name, required: true }
      - { name: folder, required: false }
      - { name: transient, required: false, default: "false" }
      - { name: owner, required: false }

  "/workspace:list":
    kind: workspace_list
    permission: "session.list"
    command_module: "Esr.Commands.Workspace.List"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "列所有已注册 workspace（ESR-bound + repo-bound）"
    args: []

  "/workspace:edit":
    kind: workspace_edit
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.Edit"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "改 workspace.json 单个字段；set=<key>=<value>（settings 用扁平 dot-key；env.<NAME>=...；chats/folders 用专门 slash）"
    args:
      - { name: name, required: true }
      - { name: set, required: true }

  "/workspace:add-folder":
    kind: workspace_add_folder
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.AddFolder"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "追加 folder 到 workspace.folders[]（path 必须是绝对路径且为 git repo）"
    args:
      - { name: name, required: true }
      - { name: path, required: true }
      - { name: folder_name, required: false }

  "/workspace:remove-folder":
    kind: workspace_remove_folder
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.RemoveFolder"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "从 workspace.folders[] 删一项（repo-bound 不能删 folders[0]，请用 /workspace:forget-repo）"
    args:
      - { name: name, required: true }
      - { name: path, required: true }

  "/workspace:bind-chat":
    kind: workspace_bind_chat
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.BindChat"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "把 chat 加进 workspace.chats[]；app_id 默认从 envelope 注入"
    args:
      - { name: name, required: true }
      - { name: chat_id, required: true }
      - { name: app_id, required: false }
      - { name: kind, required: false, default: "dm" }

  "/workspace:unbind-chat":
    kind: workspace_unbind_chat
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.UnbindChat"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "从 workspace.chats[] 删 chat；不传 app_id 则删所有该 chat_id 的项"
    args:
      - { name: name, required: true }
      - { name: chat_id, required: true }
      - { name: app_id, required: false }

  "/workspace:remove":
    kind: workspace_remove
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.Remove"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "删整个 workspace（ESR-bound 删目录；repo-bound 仅删 .esr/workspace.json + topology.yaml，保留 .esr/ 其他文件如 agents.yaml）"
    args:
      - { name: name, required: true }
      - { name: force, required: false, default: "false" }

  "/workspace:rename":
    kind: workspace_rename
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.Rename"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "改 workspace.name（id 不变；caps + sessions 引用按 UUID 不动）"
    args:
      - { name: name, required: true }
      - { name: new_name, required: true }

  "/workspace:use":
    kind: workspace_use
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.Use"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "设当前 chat 的 default workspace（per-chat 偏好；/session:new 解析时使用）"
    args:
      - { name: name, required: true }

  "/workspace:import-repo":
    kind: workspace_import_repo
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.ImportRepo"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "把一个带 .esr/workspace.json 的 git repo 加进 registered_repos.yaml；下次 esrd 启动会自动加载"
    args:
      - { name: path, required: true }

  "/workspace:forget-repo":
    kind: workspace_forget_repo
    permission: "workspace.create"
    command_module: "Esr.Commands.Workspace.ForgetRepo"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "从 registered_repos.yaml 移除 path（repo 内的 .esr/ 不动；如要删本地文件用 /workspace:remove）"
    args:
      - { name: path, required: true }

  "/workspace:info":
    kind: workspace_info
    permission: "session.list"
    command_module: "Esr.Commands.Workspace.Info"
    requires_workspace_binding: true
    requires_user_binding: true
    category: "Workspace"
    description: "显示 workspace 完整配置（id/owner/agent/folders/settings/env/chats/transient/location，含 <folders[0]>/.esr/topology.yaml overlay）"
    args:
      - { name: workspace, required: false }

  "/workspace:describe":
    kind: workspace_describe
    permission: "session.list"
    command_module: "Esr.Commands.Workspace.Describe"
    # requires_workspace_binding: false — diverges from /workspace:info
    # (which is true) on purpose. /workspace:describe is the operator-
    # facing twin of the LLM's `describe_topology` MCP tool; both use
    # the same security-filtered allowlist (Esr.Resource.Workspace.Describe)
    # which excludes owner/start_cmd/env/users.yaml. Operators may need
    # to inspect ANY workspace for diagnostic reasons (cross-workspace
    # neighbour topology checks, debugging the LLM's view), so binding
    # to one workspace would defeat the purpose. The data is already
    # safe to expose; permission `session.list` gates raw access.
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Workspace"
    description: "显示 workspace 的安全过滤后视图（与 describe_topology MCP 工具同一数据源）"
    args:
      - { name: workspace, required: true }

  # /workspace:sessions DROPPED — workspace must not depend on session (Rule 6)
  # Use /session:list (not yet wired — deferred to follow-up phase; see below).

  "/session:add-agent":
    kind: session_add_agent
    permission: "session:default/add-agent"
    command_module: "Esr.Commands.Session.AddAgent"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Sessions"
    description: "向当前 session 添加 agent 实例；name 须全局唯一"
    args:
      - { name: type, required: true }
      - { name: name, required: true }

  "/session:remove-agent":
    kind: session_remove_agent
    permission: "session:default/add-agent"
    command_module: "Esr.Commands.Session.RemoveAgent"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Sessions"
    description: "从当前 session 删除 agent；不能删 primary（需先 set-primary 到其他 agent）"
    args:
      - { name: name, required: true }

  "/session:set-primary":
    kind: session_set_primary
    permission: "session:default/add-agent"
    command_module: "Esr.Commands.Session.SetPrimary"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Sessions"
    description: "设当前 session 的 primary agent（接收无 @ 前缀的纯文本）"
    args:
      - { name: name, required: true }

  "/session:new":
    kind: session_new_surface
    permission: "session:default/create"
    command_module: "Esr.Commands.Session.New"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Sessions"
    description: "起一个新 session（自动 transient workspace）；name=<X> [agent=cc]"
    args:
      - { name: name, required: true }
      - { name: agent, required: false, default: "cc" }

  "/session:attach":
    kind: session_attach_surface
    permission: "session.attach"
    command_module: "Esr.Commands.Session.Attach"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Sessions"
    description: "把已有 session 加入当前 chat；UUID-only（用 /session:list 查 UUID）"
    args:
      - { name: session, required: true }

  "/session:detach":
    kind: session_detach_surface
    permission: null
    command_module: "Esr.Commands.Session.Detach"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Sessions"
    description: "离开当前 session（session 保持运行；可省略 session= 默认 detach 当前）"
    args:
      - { name: session, required: false }

  "/session:share":
    kind: session_share_surface
    permission: "cap.manage"
    command_module: "Esr.Commands.Session.Share"
    requires_workspace_binding: false
    requires_user_binding: true
    category: "Sessions"
    description: "把 session 访问权授给其他用户；等价于 /cap:grant session:<uuid>/<perm>"
    args:
      - { name: session, required: true }
      - { name: user, required: true }
      - { name: perm, required: false, default: "attach" }

  # /session:end, /session:list, /session:bind-workspace, /session:info — deferred
  # (command modules not yet implemented; will land as Esr.Commands.Session.*)

  "/agent:list":
    kind: agent_list
    permission: null
    command_module: "Esr.Commands.Agent.List"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Agents"
    description: "列所有可用 agent"
    args: []

  "/actor:list":
    kind: actor_list
    permission: null
    command_module: "Esr.Commands.Actors.List"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "诊断"
    description: "列所有 live Entity peer (<actor_id>  pid=<0.x.y>)"
    args: []

  "/plugin:list":
    kind: plugin_list
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.List"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "列出已安装 plugin + enabled 状态"
    args: []

  "/plugin:info":
    kind: plugin_info
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.Info"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "显示某 plugin 的 manifest 摘要"
    args:
      - { name: name, required: true }

  "/plugin:install":
    kind: plugin_install
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.Install"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "从本地路径安装 plugin（Phase 1 only local-path）"
    args:
      - { name: source, required: true }

  "/plugin:enable":
    kind: plugin_enable
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.Enable"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "启用 plugin（写 plugins.yaml；重启生效）"
    args:
      - { name: name, required: true }

  "/plugin:disable":
    kind: plugin_disable
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.Disable"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "禁用 plugin（写 plugins.yaml；重启生效）"
    args:
      - { name: name, required: true }

  "/plugin:set":
    kind: plugin_set
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.Set"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "写 plugin config key 到指定 layer（默认 global；重启生效）"
    args:
      - { name: plugin, required: true }
      - { name: key, required: true }
      - { name: value, required: true }
      - { name: layer, required: false }

  "/plugin:unset":
    kind: plugin_unset
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.Unset"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "删除 plugin config key（幂等；重启生效）"
    args:
      - { name: plugin, required: true }
      - { name: key, required: true }
      - { name: layer, required: false }

  "/plugin:show-config":
    kind: plugin_show_config
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.ShowConfig"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "显示 plugin config（默认 effective = 合并后；可选 layer=global|user|workspace）"
    args:
      - { name: plugin, required: true }
      - { name: layer, required: false }

  "/plugin:list-config":
    kind: plugin_list_config
    permission: "plugin/manage"
    command_module: "Esr.Commands.Plugin.ListConfig"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Plugins"
    description: "显示所有 enabled plugins 的 effective config"
    args: []

  "/cap:grant":
    kind: cap_grant
    permission: "cap.manage"
    command_module: "Esr.Commands.Cap.Grant"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Capabilities"
    description: "授权 cap 给用户；session cap 仅接受 UUID 形式"
    args:
      - { name: cap, required: true }
      - { name: user, required: true }

  "/cap:revoke":
    kind: cap_revoke
    permission: "cap.manage"
    command_module: "Esr.Commands.Cap.Revoke"
    requires_workspace_binding: false
    requires_user_binding: false
    category: "Capabilities"
    description: "撤销用户的 cap；session cap 仅接受 UUID 形式"
    args:
      - { name: cap, required: true }
      - { name: user, required: true }

# Internal-only kinds. Submitted from CLI tools via
# Esr.Admin.CommandQueue.Watcher (file-queue path); never appear as
# slash commands. They share the same Dispatcher dispatch table — yaml
# is the single source of truth for kind → {permission, command_module}.
internal_kinds:
  notify:
    permission: "notify.send"
    command_module: "Esr.Commands.Notify"

  reload:
    permission: "runtime.reload"
    command_module: "Esr.Commands.Reload"

  register_adapter:
    permission: "adapter.register"
    command_module: "Esr.Commands.RegisterAdapter"

  session_branch_new:
    permission: "session:default/create"
    command_module: "Esr.Commands.Scope.BranchNew"

  session_switch:
    permission: "session.switch"
    command_module: "Esr.Commands.Scope.Switch"

  session_branch_end:
    permission: "session:default/end"
    command_module: "Esr.Commands.Scope.BranchEnd"

  grant:
    permission: "cap.manage"
    command_module: "Esr.Commands.Cap.Grant"

  revoke:
    permission: "cap.manage"
    command_module: "Esr.Commands.Cap.Revoke"

  # Phase B-2 (2026-05-05): cap_* aliases for the escript dispatch
  # path. The escript's parse_slash now produces kind=`cap_grant`
  # from `esr cap grant ...` (sub-action concatenation); these
  # entries route the cap_* names to the same modules as the bare
  # grant/revoke kinds above. Read-only list/show/who-can are new.
  # Note: cap_grant and cap_revoke are also slash-callable via /cap:grant
  # and /cap:revoke (Phase 6). The same kind name is shared; slash table
  # and kind table are separate ETS tables — no conflict.
  cap_list:
    permission: "cap.read"
    command_module: "Esr.Commands.Cap.List"

  cap_show:
    permission: "cap.read"
    command_module: "Esr.Commands.Cap.Show"

  cap_who_can:
    permission: "cap.read"
    command_module: "Esr.Commands.Cap.WhoCan"

  cap_grant:
    permission: "cap.manage"
    command_module: "Esr.Commands.Cap.Grant"

  cap_revoke:
    permission: "cap.manage"
    command_module: "Esr.Commands.Cap.Revoke"

  # Phase B-3 (2026-05-05): user_* admin commands. The escript
  # produces these kinds from `esr user list/add/remove/bind-feishu/
  # unbind-feishu` via the sub-action concatenation (B-2's
  # parse_admin_flags). `user_list` is read-only (no permission);
  # mutations require `user.manage`.
  user_list:
    permission: null
    command_module: "Esr.Commands.User.List"

  user_add:
    permission: "user.manage"
    command_module: "Esr.Commands.User.Add"

  user_remove:
    permission: "user.manage"
    command_module: "Esr.Commands.User.Remove"

  user_bind_feishu:
    permission: "user.manage"
    command_module: "Esr.Commands.User.BindFeishu"

  user_unbind_feishu:
    permission: "user.manage"
    command_module: "Esr.Commands.User.UnbindFeishu"

  # 2026-05-05 cli-channel→slash migration:
  # `cli:deadletter/{list,flush}` migrated from EsrWeb.CliChannel into
  # `Esr.Commands.Deadletter.{List,Flush}`. Permission `runtime.deadletter`
  # registered in Esr.Resource.Permission.Bootstrap.
  deadletter_list:
    permission: "runtime.deadletter"
    command_module: "Esr.Commands.Deadletter.List"

  deadletter_flush:
    permission: "runtime.deadletter"
    command_module: "Esr.Commands.Deadletter.Flush"

  debug_pause:
    permission: "runtime.debug"
    command_module: "Esr.Commands.Debug.Pause"

  debug_resume:
    permission: "runtime.debug"
    command_module: "Esr.Commands.Debug.Resume"

  # 2026-05-05 cli-channel→slash migration step 8: `adapters_list`
  # is the file-read companion to the live `/actor:list` slash. Operators
  # invoke it via escript as `esr adapters list` (sub-action
  # concatenation produces kind=`adapters_list`). Pure read of
  # `~/.esrd/<env>/adapters.yaml` — no runtime dependency beyond the
  # Esr.Paths helper.
  adapters_list:
    permission: null
    command_module: "Esr.Commands.Adapters.List"

  actors_tree:
    permission: null
    command_module: "Esr.Commands.Actors.Tree"

  actors_inspect:
    permission: null
    command_module: "Esr.Commands.Actors.Inspect"

  trace:
    permission: null
    command_module: "Esr.Commands.Trace"

  # 2026-05-05 cli-channel→slash migration step 7: adapter family
  # (start / refresh / remove / rename) gated by `adapter.manage`.
  adapter_start:
    permission: "adapter.manage"
    command_module: "Esr.Commands.Adapter.Start"

  adapter_refresh:
    permission: "adapter.manage"
    command_module: "Esr.Commands.Adapter.Refresh"

  adapter_remove:
    permission: "adapter.manage"
    command_module: "Esr.Commands.Adapter.Remove"

  adapter_rename:
    permission: "adapter.manage"
    command_module: "Esr.Commands.Adapter.Rename"

  cross_app_test:
    permission: "cross_app_test.invoke"
    command_module: "Esr.Commands.CrossAppTest"

  # Legacy session kinds (Scope.*) — kept for internal queue path compatibility.
  # The slash-callable forms are now /session:* (Phase 6 colon-namespace).
  session_new:
    permission: "session:default/create"
    command_module: "Esr.Commands.Scope.New"

  session_end:
    permission: "session:default/end"
    command_module: "Esr.Commands.Scope.End"

  session_list:
    permission: "session.list"
    command_module: "Esr.Commands.Scope.List"

  attach:
    permission: null
    command_module: "Esr.Commands.Attach"
