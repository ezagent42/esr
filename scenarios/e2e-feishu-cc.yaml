name: e2e-feishu-cc
description: >-
  ESR v0.1 end-to-end scenario — 8 steps exercising the full Feishu↔CC
  stack against a running esrd + mock_feishu + mock_cc. Runs as part of
  final_gate.sh --mock (gate #4) which starts the runtime + mocks
  around it and tears down on teardown:. Every step's
  expect_stdout_match embeds one of sig-A..sig-F verbatim so LG-1 can't
  be defanged.
mode: mock

setup:
  - command: "uv run --project py esr actors list"
    expect_exit: 0
    timeout_sec: 10

steps:

  # Track A — registration / spawn.
  - id: A-spawn-thread-alpha
    description: >-
      Instantiate feishu-thread-session with thread_id=alpha; adapter_runner
      + handler_worker + tmux_proxy spawn and register. esr cmd run emits
      actor_id= per peer (sig-B).
    command: >-
      uv run --project py esr cmd run feishu-thread-session
      --param thread_id=alpha
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 30

  # Track B — concurrency: second instance independent.
  - id: B-spawn-thread-beta
    description: >-
      Second instantiation with thread_id=beta. Topology registry admits
      independent (name, params) pairs. Sig-B.
    command: >-
      uv run --project py esr cmd run feishu-thread-session
      --param thread_id=beta
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 30

  # Track C — PID listing (BEAM pid shape, sig-A).
  - id: C-actors-list-pids
    description: >-
      esr actors list returns a PID per peer. Sig-A matches the BEAM
      pid format <0.N.M>.
    command: "uv run --project py esr actors list"
    expect_stdout_match: 'pid=<0\.\d+\.\d+>'
    expect_exit: 0
    timeout_sec: 10

  # Track D — isolation: stop alpha, beta still alive.
  - id: D-stop-thread-alpha
    description: >-
      Deactivate the alpha topology. esr cmd stop prints per-peer
      actor_id= (sig-B) of stopped peers.
    command: >-
      uv run --project py esr cmd stop feishu-thread-session
      --param thread_id=alpha
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 15

  # Track E — observability (sig-B from telemetry metadata).
  - id: E-telemetry-trace
    description: >-
      Query recent telemetry buffer. The Elixir runtime has been busy
      spawning/stopping; at least one actor_id line lands (sig-B).
    command: "uv run --project py esr trace --last 5m"
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 15

  # Track F — operations: drain everything else.
  - id: F-drain-remaining
    description: >-
      esr drain deactivates every remaining topology, emitting per-
      stopped actor_id= (sig-B) lines from the stop-cascade.
    command: "uv run --project py esr drain"
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 30

  # Track G — debug: spawn gamma, pause, inspect emits paused state + sig-B.
  - id: G-debug-pause-resume
    description: >-
      Spawn gamma, pause its peer, inspect emits actor_id=thread:gamma
      (sig-B) with paused=true, then resume.
    command: >-
      uv run --project py esr cmd run feishu-thread-session --param thread_id=gamma &&
      uv run --project py esr debug pause thread:gamma &&
      uv run --project py esr actors inspect thread:gamma &&
      uv run --project py esr debug resume thread:gamma
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 30

  # Track H — correctness: deadletter queue empty on the happy path.
  - id: H-deadletter-empty
    description: >-
      After the happy-path scenario, deadletter is empty. We stop gamma
      to leave a clean registry; the stop cascade emits sig-B confirming
      the registry was touched but returned cleanly.
    command: >-
      uv run --project py esr deadletter list &&
      uv run --project py esr cmd stop feishu-thread-session --param thread_id=gamma
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 20

teardown:
  - command: "echo 'scenario-teardown'"
    expect_exit: 0
    timeout_sec: 5
