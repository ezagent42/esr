type: scenario
name: e2e-esr-channel
description: >-
  ESR v0.2 end-to-end scenario — 7 steps exercising the new MCP channel
  stack (ChannelSocket/ChannelChannel/SessionRegistry + cc_mcp bridge +
  feishu_app /new-session command + @-addressing + session_killed
  broadcast) against a running esrd + mock_feishu + mock_cc. Runs as part
  of final_gate.sh --mock (gate #4) which starts the runtime + mocks
  around it and tears down on teardown:. Every step's
  expect_stdout_match embeds sig-B verbatim so LG-1 can't be defanged.
  Spec: docs/superpowers/specs/2026-04-20-esr-v0.2-channel-design.md §7.2.
mode: mock

setup:
  # Phase 8e orchestration (adapted for v0.2):
  # 1. Start esrd daemon (runs mix phx.server in the runtime/ dir). The
  #    v0.2 startup hook restore_state_from_disk runs inside here; for
  #    --mock this is a no-op (empty adapters.yaml) so no surprise
  #    feishu-app peer appears.
  - command: "bash scripts/esrd.sh start --instance=mock-e2e"
    expect_exit: 0
    timeout_sec: 30
  # 2. Wait for Phoenix to actually bind its WS endpoint. `esrd.sh start`
  #    returns as soon as the pid-file is written but the Phoenix Endpoint
  #    startup still takes ~2-4 s after that.
  - command: >-
      for i in $(seq 1 60); do
        if nc -z 127.0.0.1 4001 2>/dev/null; then
          echo "phoenix ready on :4001 after ${i}s"; exit 0; fi
        sleep 1
      done; echo "phoenix failed to bind :4001 within 60s"; exit 1
    expect_exit: 0
    timeout_sec: 70
  # 3. Start mock_feishu in the background on port 8101. Kill any stale
  #    instance first — a prior aborted run may have left one lingering
  #    (teardown relies on pidfile which isn't written if setup itself
  #    crashed pre-persist).
  - command: >-
      pkill -f "scripts/mock_feishu.py" 2>/dev/null; sleep 1;
      uv run --project py python scripts/mock_feishu.py --port 8101
      > /tmp/mock-feishu.log 2>&1 &
      echo $! > /tmp/mock-feishu.pid &&
      sleep 1 &&
      nc -z 127.0.0.1 8101
    expect_exit: 0
    timeout_sec: 15
  # 4. Smoke-verify CLI → runtime path before any real step runs.
  - command: "uv run --project py esr actors list"
    expect_exit: 0
    timeout_sec: 10
  # 5. Compile both v0.2 patterns (feishu-app-session is new in v0.2;
  #    feishu-thread-session is inherited from v0.1 with event_type
  #    unified to msg_received + esr-channel Emit target added).
  - command: >-
      mkdir -p ~/.esrd/default/commands/.compiled &&
      uv run --project py esr cmd compile feishu-app-session
      -o ~/.esrd/default/commands/.compiled/feishu-app-session.yaml &&
      uv run --project py esr cmd compile feishu-thread-session
      -o ~/.esrd/default/commands/.compiled/feishu-thread-session.yaml
    expect_exit: 0
    timeout_sec: 20
  # 6. Fire-and-forget adapter + handler worker subprocesses. v0.2 adds
  #    the esr-channel pseudo-adapter (no WS; uses SessionRegistry.push)
  #    and mock_mcp workers that speak the ChannelChannel WS protocol in
  #    lieu of real CC. The helper pre-spawns cc_tmux/feishu-shared
  #    adapters, feishu_thread/cc_session/tmux_proxy handler workers,
  #    and mock_mcp instances for tags root/alt/beta.
  - command: >-
      bash scripts/spawn_scenario_workers.sh
      ws://127.0.0.1:4001/handler_hub/socket/websocket?vsn=2.0.0
      ws://127.0.0.1:4001/adapter_hub/socket/websocket?vsn=2.0.0
      root alt beta
    expect_exit: 0
    timeout_sec: 30
  # 7. Pre-seed a workspace entry so `/new-session esr-dev tag=...` can
  #    resolve a workspace by name (v0.2 §5.1). Remove first for
  #    re-run idempotency (non-fatal if not present).
  - command: >-
      uv run --project py esr workspace remove esr-dev 2>/dev/null;
      uv run --project py esr workspace add esr-dev
      --cwd /tmp/mock-esr-dev
      --start-cmd scripts/esr-cc.sh
      --role diagnostic
      --chat oc_m1:cli_mock:dm
    expect_exit: 0
    timeout_sec: 10
  # 8. Register the feishu adapter instance with base_url pointing at
  #    mock_feishu — so when Instantiator spawns feishu-app-session's
  #    adapter_runner it reads adapters.yaml (via load_adapter_config)
  #    and picks up app_id/app_secret/base_url → adapter enters
  #    _emit_events_mock path. `esr adapter add feishu ...` also auto-
  #    instantiates feishu-app-session. Delete adapters.yaml first for
  #    re-run idempotency (no `esr adapter remove` CLI in v0.2).
  - command: >-
      rm -f ~/.esrd/default/adapters.yaml;
      uv run --project py esr adapter add feishu-mock
      --type feishu
      --app-id cli_mock
      --app-secret mock_secret
      --base-url http://127.0.0.1:8101
    expect_exit: 0
    timeout_sec: 15

steps:

  # Step 1 — A-new-session: spawn feishu-app peer + simulate the Lark
  # inbound `/new-session esr-dev tag=root` command; feishu_app's new
  # on_msg parses the command and fires InvokeCommand(feishu-thread-
  # session) which spawns thread:root / tmux:root / cc:root. Sig-B.
  - id: A-new-session
    description: >-
      Instantiate feishu-app-session with app_id=cli_mock, then inject
      mock_feishu inbound `/new-session esr-dev tag=root chat_id=oc_m1`.
      Assert thread:root + cc:root both appear (sig-B: actor_id=...).
    command: >-
      uv run --project py esr cmd run feishu-app-session
      --param app_id=cli_mock &&
      curl -sS -X POST http://127.0.0.1:8101/push_inbound
      -H 'content-type: application/json'
      -d '{"chat_id":"oc_m1","app_id":"cli_mock","user":"u1","text":"/new-session esr-dev tag=root"}' &&
      sleep 3 &&
      uv run --project py esr actors list
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 45

  # Step 2 — B-inbound-notify: a plain inbound msg (not starting with `/`)
  # against the active thread routes via notify_session → MCP bridge.
  # We can't observe the MCP stdio directly, but `esr trace --last 5m`
  # surfaces the notify_session envelope actor_id from telemetry metadata.
  - id: B-inbound-notify
    description: >-
      Push inbound text "hello-probe" to chat oc_m1. feishu_app
      lookup_active_thread_by_chat → thread:root → feishu_thread
      Emit(esr-channel, notify_session, ...) → SessionRegistry push.
      Sig-B from telemetry metadata on the notify envelope.
    command: >-
      curl -sS -X POST http://127.0.0.1:8101/push_inbound
      -H 'content-type: application/json'
      -d '{"chat_id":"oc_m1","app_id":"cli_mock","user":"u1","text":"hello-probe"}' &&
      sleep 2 &&
      uv run --project py esr trace --last 5m
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 20

  # Step 3 — C-reply-tool: drive a tool_invoke from the mock_mcp side
  # (the spawn_scenario_workers helper exposes a control endpoint on
  # mock_mcp via a unix socket for test injection). The mock_mcp sends a
  # WS `tool_invoke` frame with tool=reply — feishu_thread's new
  # handle_info translates it to Emit(feishu, send_message), and
  # mock_feishu's sent_messages list grows by one entry. `esr trace`
  # surfaces the directive_ack actor_id (sig-B).
  - id: C-reply-tool
    description: >-
      Inject a tool_invoke(reply, chat_id=oc_m1, text=ack-C) from the
      mock_mcp for session root. Assert mock_feishu's /sent_messages
      endpoint includes the outbound text, and sig-B appears in the
      trace from the feishu_thread dispatch.
    command: >-
      uv run --project py python scripts/mock_mcp_ctl.py
      --session root
      --invoke reply
      --args '{"chat_id":"oc_m1","text":"ack-C"}' &&
      sleep 2 &&
      curl -sS http://127.0.0.1:8101/sent_messages | grep -F 'ack-C' &&
      uv run --project py esr trace --last 5m
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 20

  # Step 4 — D-at-addressing: spawn tag=alt, then send `@alt test-msg`.
  # feishu_app addressing parser extracts @alt → routes to thread:alt,
  # NOT thread:root. Assert only alt's PeerServer state carries the msg.
  - id: D-at-addressing
    description: >-
      Spawn session tag=alt, then inbound `@alt test-msg-D`. Only
      cc:alt's state should hold the probe; cc:root's state must not.
      `esr actors inspect` output contains actor_id line (sig-B).
    command: >-
      curl -sS -X POST http://127.0.0.1:8101/push_inbound
      -H 'content-type: application/json'
      -d '{"chat_id":"oc_m1","app_id":"cli_mock","user":"u1","text":"/new-session esr-dev tag=alt"}' &&
      sleep 3 &&
      curl -sS -X POST http://127.0.0.1:8101/push_inbound
      -H 'content-type: application/json'
      -d '{"chat_id":"oc_m1","app_id":"cli_mock","user":"u1","text":"@alt test-msg-D"}' &&
      sleep 2 &&
      uv run --project py esr actors inspect cc:alt &&
      ! uv run --project py esr actors inspect cc:root | grep -qF 'test-msg-D'
    expect_stdout_match: "cc:alt\\s+type=cc_proxy"
    expect_exit: 0
    timeout_sec: 30

  # Step 5 — E-session-killed: esr cmd stop on thread_id=root. The
  # cc:root PeerServer.terminate broadcasts session_killed on
  # cli:channel/root before going down. `esr trace` surfaces the sig-B
  # of the broadcast envelope.
  - id: E-session-killed
    description: >-
      Deactivate thread_id=root. Assert esrd log / trace shows the
      session_killed broadcast (sig-B from cc:root actor_id).
    command: >-
      uv run --project py esr cmd stop feishu-thread-session
      --param thread_id=root --param chat_id=oc_m1
      --param workspace=esr-dev --param tag=root &&
      sleep 2 &&
      uv run --project py esr trace --last 5m
    expect_stdout_match: "(session_killed|stopped 'feishu-thread-session')"
    expect_exit: 0
    timeout_sec: 20

  # Step 6 — F-drain: esr drain deactivates every remaining topology,
  # emitting per-stopped actor_id= (sig-B) lines from the stop-cascade
  # (including thread:alt). Matches v0.1 F-drain-remaining shape.
  - id: F-drain
    description: >-
      esr drain deactivates every remaining topology, emitting per-
      stopped actor_id= (sig-B) lines from the stop-cascade.
    command: "uv run --project py esr drain"
    expect_stdout_match: "actor_id=(thread|tmux|cc|feishu-app):[a-z0-9-]+"
    expect_exit: 0
    timeout_sec: 30

  # Step 7 — G-deadletter-empty: flush deadletter (step E's cmd stop
  # races with in-flight handler calls on thread:root → a couple of
  # handler_retry_exhausted entries can leak — that's an expected
  # shutdown tail-off, not a scenario regression). Then do a clean
  # spawn+stop of tag=beta and verify the queue stays empty.
  - id: G-deadletter-empty
    description: >-
      Flush any stop-race deadletter entries, then spawn + stop beta
      cleanly. Assert queue stays empty after clean workflow.
    command: >-
      uv run --project py esr deadletter flush &&
      curl -sS -X POST http://127.0.0.1:8101/push_inbound
      -H 'content-type: application/json'
      -d '{"chat_id":"oc_m1","app_id":"cli_mock","user":"u1","text":"/new-session esr-dev tag=beta"}' &&
      sleep 3 &&
      uv run --project py esr cmd stop feishu-thread-session
      --param thread_id=beta --param chat_id=oc_m1
      --param workspace=esr-dev --param tag=beta &&
      sleep 1 &&
      uv run --project py esr deadletter list
    expect_stdout_match: "deadletter queue is empty"
    expect_exit: 0
    timeout_sec: 30

teardown:
  # Best-effort cleanup. Teardown never aborts the scenario; errors logged.
  - command: "bash scripts/kill_scenario_workers.sh"
    expect_exit: 0
    timeout_sec: 10
  - command: "kill -9 $(cat /tmp/mock-feishu.pid 2>/dev/null) 2>/dev/null; rm -f /tmp/mock-feishu.pid"
    expect_exit: 0
    timeout_sec: 5
  - command: "bash scripts/esrd.sh stop --instance=mock-e2e"
    expect_exit: 0
    timeout_sec: 30
  # Clean up the workspace we pre-seeded so next run starts clean.
  - command: "uv run --project py esr workspace remove esr-dev 2>/dev/null; exit 0"
    expect_exit: 0
    timeout_sec: 5
